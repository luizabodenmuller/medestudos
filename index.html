<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Estudos — PBL</title>
<style>
  :root{ --primary:#7a1f3d; --primary-light:#f0dbe3; --bg:#faf7f8; }
  *{box-sizing:border-box;}
  body{ font-family:'Segoe UI', Arial, sans-serif; background:var(--bg); margin:0; padding:24px; color:#222; }
  .wrap{ max-width:920px; margin:0 auto; }
  h1{ color:var(--primary); font-size:24px; margin-bottom:2px; }
  .subtitle{ color:#777; font-size:13.5px; margin-bottom:20px; }
  .search{ width:100%; padding:12px 16px; border-radius:10px; border:2px solid var(--primary-light); font-size:14.5px; margin-bottom:22px; }
  .search:focus{ outline:none; border-color:var(--primary); }
  .fase-group{ margin-bottom:28px; }
  .fase-title{ font-size:15px; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; border-bottom:2px solid var(--primary-light); padding-bottom:6px; }
  .sp-card{ background:#fff; border:2px solid var(--primary-light); border-radius:14px; padding:16px 20px; margin-bottom:14px; box-shadow:0 3px 10px rgba(0,0,0,.05); }
  .sp-card.hidden{ display:none; }
  .sp-header{ display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
  .sp-num{ font-size:16px; font-weight:700; color:var(--primary); }
  .sp-title{ font-size:14px; color:#444; }
  .sp-kw{ font-size:11.5px; color:#999; margin-bottom:12px; }
  .links{ display:flex; flex-wrap:wrap; gap:10px; }
  .links a{ text-decoration:none; font-size:13px; font-weight:600; padding:8px 14px; border-radius:8px; border:2px solid var(--primary); color:var(--primary); transition:.15s; }
  .links a:hover{ background:var(--primary); color:#fff; }
  .links a.missing{ opacity:.35; pointer-events:none; border-style:dashed; }
  .empty-msg{ text-align:center; color:#999; font-size:14px; padding:30px; display:none; }
  .empty-msg.show{ display:block; }
  .footer-note{ margin-top:30px; font-size:11.5px; color:#aaa; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 Painel de Estudos — PBL</h1>
  <div class="subtitle">Resumos, flashcards, Anki e quizzes de todas as SPs, organizados por fase</div>

  <input type="text" class="search" id="searchBox" placeholder="🔎 Buscar por número da SP, título ou palavra-chave...">

  <div id="content"></div>
  <div class="empty-msg" id="emptyMsg">Nenhuma SP encontrada para essa busca.</div>

  <div class="footer-note">
    Para adicionar uma nova SP, edite o array <code>DATA</code> no código-fonte deste arquivo (script no final do HTML).
  </div>
</div>

<script>
/* ============================================================
   COMO ADICIONAR UMA NOVA SP:
   Basta acrescentar um novo objeto ao array abaixo, dentro da
   fase correspondente. Os campos "resumo", "flashcards", "anki"
   e "quiz" devem ser o CAMINHO RELATIVO até o arquivo, a partir
   da pasta onde este index.html está salvo.

   Estrutura usada neste repositório (tudo direto na raiz, sem
   subpastas — mais simples para o GitHub Pages):
     index.html   <-- este arquivo
     SP1.1_3aFase_Resumo.pdf
     SP1.1_3aFase_Flashcards.html
     SP1.1_3aFase_Anki.txt
     SP1.1_3aFase_Quiz.html
     SP1.2_3aFase_Resumo.pdf
     ...

   Se algum arquivo ainda não existir, apague a linha correspondente
   (ou deixe null) — o botão aparecerá desabilitado automaticamente.
   ============================================================ */

const DATA = [
  {
    fase: "3ª Fase",
    sps: [
      {
        num: "SP 1.1",
        titulo: "Primeira gestação, primeiros desafios",
        keywords: "Pré-natal, fatores de risco, teratógenos, rubéola, toxoplasmose, Zika, síndrome alcoólica fetal, prematuridade, RCIU",
        resumo: "SP1.1_3aFase_Resumo.pdf",
        flashcards: "SP1.1_3aFase_Flashcards.html",
        anki: "SP1.1_3aFase_Anki.txt",
        quiz: "SP1.1_3aFase_Quiz.html"
      },
      {
        num: "SP 1.2",
        titulo: "Nasceu, e agora?",
        keywords: "Classificação do RN, PIG, GIG, AIG, Apgar, adaptação cardiorrespiratória, perda de peso fisiológica, termorregulação, icterícia neonatal, triagem neonatal, vitamina K",
        resumo: "SP1.2_3aFase_Resumo.pdf",
        flashcards: "SP1.2_3aFase_Flashcards.html",
        anki: "SP1.2_3aFase_Anki.txt",
        quiz: "SP1.2_3aFase_Quiz.html"
      }
      // Acrescente as próximas SPs aqui, seguindo o mesmo modelo:
      // {
      //   num: "SP 1.2",
      //   titulo: "...",
      //   keywords: "...",
      //   resumo: "SP1.2/SP1.2_3aFase_Resumo.pdf",
      //   flashcards: "SP1.2/SP1.2_3aFase_Flashcards.html",
      //   anki: "SP1.2/SP1.2_3aFase_Anki.txt",
      //   quiz: "SP1.2/SP1.2_3aFase_Quiz.html"
      // },
    ]
  }
  // Para uma nova fase, acrescente outro bloco:
  // {
  //   fase: "4ª Fase",
  //   sps: [ ... ]
  // }
];

function linkOrDisabled(path, label, icon){
  if(!path){
    return `<a class="missing" href="#">${icon} ${label}</a>`;
  }
  return `<a href="${path}" target="_blank">${icon} ${label}</a>`;
}

function render(filter){
  const content = document.getElementById('content');
  content.innerHTML = '';
  let anyVisible = false;

  DATA.forEach(faseGroup => {
    const faseDiv = document.createElement('div');
    faseDiv.className = 'fase-group';

    const title = document.createElement('div');
    title.className = 'fase-title';
    title.textContent = faseGroup.fase;
    faseDiv.appendChild(title);

    let faseHasVisible = false;

    faseGroup.sps.forEach(sp => {
      const haystack = `${sp.num} ${sp.titulo} ${sp.keywords}`.toLowerCase();
      const match = !filter || haystack.includes(filter);
      if(match) { faseHasVisible = true; anyVisible = true; }

      const card = document.createElement('div');
      card.className = 'sp-card' + (match ? '' : ' hidden');
      card.innerHTML = `
        <div class="sp-header">
          <span class="sp-num">${sp.num}</span>
          <span class="sp-title">${sp.titulo}</span>
        </div>
        <div class="sp-kw">${sp.keywords}</div>
        <div class="links">
          ${linkOrDisabled(sp.resumo, 'Resumo', '📄')}
          ${linkOrDisabled(sp.flashcards, 'Flashcards', '🃏')}
          ${linkOrDisabled(sp.anki, 'Anki', '🎴')}
          ${linkOrDisabled(sp.quiz, 'Quiz', '📝')}
        </div>
      `;
      faseDiv.appendChild(card);
    });

    if(faseGroup.sps.length > 0){
      content.appendChild(faseDiv);
    }
  });

  document.getElementById('emptyMsg').classList.toggle('show', !anyVisible);
}

document.getElementById('searchBox').addEventListener('input', (e)=>{
  render(e.target.value.trim().toLowerCase());
});

render('');
</script>
</body>
</html>
