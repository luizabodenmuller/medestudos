<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SP 3.4 - Flashcards</title>
<style>
  :root { --primary:#7a1f3d; --primary-light:#9c3355; --bg:#faf7f8; }
  * { box-sizing: border-box; }
  body { font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif; background:var(--bg); margin:0; padding:20px; color:#1a1a1a; }
  header { text-align:center; margin-bottom:20px; }
  header h1 { color:var(--primary); margin-bottom:2px; font-size:22px; }
  header p { color:#777; margin-top:0; font-size:13px; }
  .controls { max-width:900px; margin:0 auto 18px auto; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .filter-btn { background:#fff; border:1px solid #e6c9d3; color:var(--primary); padding:6px 14px; border-radius:16px; font-size:12.5px; cursor:pointer; transition:all .15s; }
  .filter-btn:hover { background:#f7ecf0; }
  .filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .progress-wrap { max-width:900px; margin:0 auto 20px auto; text-align:center; font-size:13px; color:#444; }
  .progress-bar { width:100%; max-width:400px; margin:6px auto 0 auto; height:8px; background:#f0dbe3; border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--primary); width:0%; transition:width .2s; }
  .deck { max-width:900px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
  .card-outer { perspective:1200px; height:220px; }
  .card-outer.hidden { display:none; }
  .card-inner { position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d; cursor:pointer; }
  .card-outer.flipped .card-inner { transform:rotateY(180deg); }
  .card-face { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:10px; padding:16px; display:flex; flex-direction:column; box-shadow:0 2px 6px rgba(0,0,0,0.12); overflow:auto; }
  .card-front { background:#fff; border-top:5px solid var(--primary); }
  .card-back { background:var(--primary); color:#fff; transform:rotateY(180deg); }
  .card-cat { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--primary-light); margin-bottom:8px; font-weight:bold; }
  .card-back .card-cat { color:#eeccd7; }
  .card-text { font-size:13.5px; line-height:1.4; flex:1; }
  .card-hint { font-size:10px; color:#999; text-align:center; margin-top:6px; }
  .card-back .card-hint { color:#d9b3c0; }
  footer { text-align:center; margin-top:24px; font-size:11px; color:#888; }
</style>
</head>
<body>
<header>
  <h1>SP 3.4 — "Entre águas e descasos"</h1>
  <p>Flashcards · 2ª Fase · Parasitologia / Helmintos</p>
</header>
<div class="progress-wrap">
  <span id="progressText">0 / 0 revisados</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div class="controls" id="filterControls"></div>
<div class="deck" id="deck"></div>
<footer>Clique no cartão para virar. Baseado exclusivamente no material da SP 3.4.</footer>

<script>
const cards = [
  {cat:"Biologia dos Helmintos", front:"Em quais três grupos os helmintos são subdivididos?", back:"Nematoides (vermes cilíndricos/fusiformes), trematódeos (vermes chatos) e cestoides (vermes em fita)."},
  {cat:"Biologia dos Helmintos", front:"Quais características distinguem os helmintos parasitas dos de vida livre?", back:"Sistema digestório pode estar ausente; sistema nervoso reduzido; locomoção reduzida/ausente; sistema reprodutor complexo (produzem grande número de ovos)."},
  {cat:"Biologia dos Helmintos", front:"Diferencie helmintos dioicos e monoicos.", back:"Dioicos: sexos separados (macho e fêmea distintos), reprodução só quando ambos estão no mesmo hospedeiro. Monoicos/hermafroditas: mesmo animal com órgãos masculinos e femininos (podem copular mutuamente ou autofertilizar)."},
  {cat:"Biologia dos Helmintos", front:"Qual a diferença entre ciclo monoxeno e heteroxeno?", back:"Monoxeno: um só hospedeiro. Heteroxeno: envolve hospedeiro(s) intermediário(s) além do definitivo."},
  {cat:"Biologia dos Helmintos", front:"Quais as três porções do corpo de um cestoide adulto?", back:"Escólex (cabeça com ventosas e ganchos/acúleos no rostelo, para fixação), colo (região de crescimento) e estróbilo (cadeia de proglotes)."},
  {cat:"Biologia dos Helmintos", front:"Como os cestoides se alimentam, já que não têm trato digestório?", back:"Absorvem nutrientes semidigeridos diretamente pelo tegumento (por difusão), que é coberto por microtríquias que aumentam a superfície de absorção."},
  {cat:"Biologia dos Helmintos", front:"O que é a oncosfera (embrião hexacanto)?", back:"O embrião contido em cada ovo de cestoide, com seis acúleos (ganchos), forma infectante para o hospedeiro intermediário."},
  {cat:"Biologia dos Helmintos", front:"Qual a sequência larval dos trematódeos digenéticos?", back:"Miracídio (larva ciliada) → caramujo (1º hospedeiro intermediário) → esporocisto → (rédia) → cercárias (formas infectantes móveis) → metacercárias (cercárias encistadas)."},
  {cat:"Biologia dos Helmintos", front:"Qual característica distingue o Schistosoma dos demais trematódeos?", back:"São dioicos, com dimorfismo sexual: o macho é maior e seu corpo dobra-se formando o canal ginecóforo, onde a fêmea cilíndrica se aloja durante a cópula."},
  {cat:"Biologia dos Helmintos", front:"Quais estruturas caracterizam a morfologia dos nematódeos?", back:"Corpo cilíndrico não segmentado, cutícula acelular externa, pseudoceloma (esqueleto hidrostático), sistema digestório completo (boca, intestino, ânus); a maioria é dioica (machos com espículas)."},
  {cat:"Biologia dos Helmintos", front:"Quais nematódeos têm o OVO como forma infectante?", back:"Ascaris, Trichuris e Enterobius. Já os ancilostomídeos e o Strongyloides stercoralis têm a LARVA (L3 filarioide) como forma infectante, capaz de penetrar a pele."},
  {cat:"Patogenicidade/Evasão", front:"Qual resposta imune parece mais efetiva contra os helmintos?", back:"A resposta imune adquirida (produção de anticorpos e ativação de células T), embora a inata e o complemento auxiliem. Predomina o padrão Th2."},
  {cat:"Patogenicidade/Evasão", front:"Por que os helmintos não são fagocitados e como são destruídos?", back:"São multicelulares e grandes demais para serem fagocitados; são atacados por desgranulação de eosinófilos e basófilos diretamente sobre o parasita (proteína básica principal, proteína catiônica, peroxidase, proteases)."},
  {cat:"Patogenicidade/Evasão", front:"O que é a eosinofilia nas helmintíases?", back:"Característica marcante associada à presença/migração dos vermes. Não ocorre em todas (ex.: ausente quando o agente está em estruturas císticas)."},
  {cat:"Patogenicidade/Evasão", front:"Cite mecanismos de evasão/modulação imune dos helmintos.", back:"Bloqueio de citocinas pró-inflamatórias (IL-12) e de coestimulatórias; estímulo à IL-10 e TGF-β; expansão de Treg com supressão de Th1/Th17; predomínio de macrófagos M2 (arginase-1); mudança antigênica; localização em regiões protegidas e tegumento espesso."},
  {cat:"Patogenicidade/Evasão", front:"Como o efeito imunomodulador dos helmintos se relaciona com a hipótese da higiene?", back:"A redução da exposição a helmintos e outros patógenos na infância poderia resultar em sistema imune desequilibrado e hiper-reativo, aumentando doenças alérgicas/inflamatórias em países desenvolvidos."},
  {cat:"Resposta Imune", front:"O que são as alarminas e qual seu papel na resposta aos helmintos?", back:"IL-25, IL-33 e TSLP, derivadas das células epiteliais; induzem liberação de IL-4, IL-13, IL-9 e IL-5 por ILC2, linfócitos Th2, eosinófilos e basófilos."},
  {cat:"Resposta Imune", front:"Qual o papel da IL-5 e da IL-13 na defesa contra helmintos?", back:"IL-5 ativa eosinófilos (liberam grânulos tóxicos ao parasita). IL-13 estimula a secreção de muco e o peristaltismo intestinal, intensificando a expulsão dos parasitas."},
  {cat:"Resposta Imune", front:"Qual isotipo de anticorpo domina a resposta aos helmintos e a qual receptor se liga nos mastócitos?", back:"A IgE, que se liga ao receptor Fc de alta afinidade FcεRI nos mastócitos, causando sua ativação."},
  {cat:"Resposta Imune", front:"Como as citocinas Th2 podem levar à fibrose?", back:"IL-4 e IL-13 induzem a ativação alternativa de macrófagos (M2), que produzem fatores de crescimento estimulando síntese de colágeno e angiogênese — reparo tecidual que pode contribuir para fibrose."},
  {cat:"Resposta Imune", front:"Como as mucinas e o peristaltismo contribuem para a expulsão dos vermes?", back:"As mucinas das células caliciformes imobilizam e revestem os vermes (facilitando o ataque por proteínas tóxicas e anticorpos); o peristaltismo aumentado na inflamação expele os helmintos."},
  {cat:"Ascaridíase", front:"Como ocorre a transmissão da ascaridíase?", back:"Via fecal-oral: ingestão de ovos larvados (após ~10-15 dias no solo) por mãos sujas, alimentos ou água contaminados com fezes."},
  {cat:"Ascaridíase", front:"Descreva o ciclo pulmonar (de Loss) do Ascaris.", back:"Ovos eclodem no duodeno → larvas penetram a parede intestinal → veia porta → fígado → coração → pulmões → árvore brônquica → traqueia/faringe → deglutidas → intestino delgado → vermes adultos que liberam ovos nas fezes."},
  {cat:"Ascaridíase", front:"O que é a síndrome de Loeffler?", back:"Pneumonite eosinofílica (pneumonia verminótica) causada pela migração de larvas de Ascaris pelos pulmões, com desconforto, tosse, febre e eosinofilia."},
  {cat:"Ascaridíase", front:"Quantos ovos uma fêmea de Ascaris elimina por dia?", back:"Cerca de 200.000 ovos por dia. Os ovos resistem no ambiente por anos, facilitando a contaminação."},
  {cat:"Ascaridíase", front:"Quais as complicações cirúrgicas da ascaridíase?", back:"Obstrução intestinal (especialmente em crianças), abdome agudo obstrutivo, apendicite, obstrução do colédoco/ampola de Vater ou canal de Wirsung (pancreatite), localizações ectópicas (vesícula, pâncreas)."},
  {cat:"Enterobiose", front:"Por que as fêmeas de Enterobius migram à noite para a região perianal?", back:"A condição anaeróbica do intestino impede a maturação dos ovos; a fêmea emerge pelo esfíncter anal para alcançar um ambiente aeróbico, necessário à maturação dos ovos/larvas. Por isso não depositam ovos nas fezes."},
  {cat:"Enterobiose", front:"O que são autoinfecção e retroinfecção na enterobiose?", back:"Autoinfecção: o ato de coçar contamina dedos/unhas com ovos, reingeridos pelo paciente (reinício do ciclo). Retroinfecção: larvas eclodem na região perianal e migram de volta ao reto/intestino."},
  {cat:"Enterobiose", front:"Qual o sintoma principal da enterobiose e por que é noturno?", back:"Prurido anal (e perineal) intenso, mais comum à noite, associado à migração das fêmeas e a uma reação alérgica à presença do verme e à ovipostura na região perianal."},
  {cat:"Enterobiose", front:"Onde se aloja definitivamente o Enterobius vermicularis?", back:"No intestino grosso (região do íleo e ceco); as fêmeas grávidas migram à região anal/perianal para depositar os ovos."},
  {cat:"Teníase", front:"Qual a diferença clínica primordial entre T. solium e T. saginata?", back:"A ocorrência da cisticercose humana, relacionada exclusivamente às larvas de T. solium. A T. saginata causa apenas teníase."},
  {cat:"Teníase", front:"Compare T. solium e T. saginata quanto à carne, tamanho e proglotes.", back:"T. solium: carne suína, até 3-5 m, proglotes eliminadas passivamente. T. saginata: carne bovina, até 8 m, proglotes eliminadas ativamente."},
  {cat:"Teníase", front:"Quem é o hospedeiro definitivo e o intermediário na teníase?", back:"O humano é o hospedeiro definitivo (verme adulto no intestino). Bovinos (T. saginata) e suínos (T. solium) são os hospedeiros intermediários (cisticercos no músculo)."},
  {cat:"Teníase", front:"Como o humano adquire cisticercose/neurocisticercose?", back:"Ao ingerir OVOS de T. solium (das fezes humanas), tornando-se hospedeiro intermediário acidental; os cisticercos se depositam em músculos, olhos e cérebro (as 'pipocas' na neurocisticercose)."},
  {cat:"Teníase", front:"Como se diferencia a T. solium no diagnóstico das proglotes?", back:"As proglotes grávidas de T. solium têm entre 5 e 10 ramificações uterinas principais. Os ovos das duas espécies de Taenia são indistinguíveis."},
  {cat:"Diagnóstico", front:"Qual o método de escolha para diagnóstico de Enterobius vermicularis?", back:"O método de Graham (fita adesiva/swab anal): justapõe-se fita adesiva à mucosa anal, pois a fêmea deposita ovos na região perianal e não nas fezes (exame de fezes positivo em só 5-15%)."},
  {cat:"Diagnóstico", front:"Para que serve o método de Kato-Katz?", back:"Técnica quantitativa (ovos por grama de fezes), mais usada no mundo, especialmente para Schistosoma mansoni e outros helmintos. Não detecta cistos de protozoários nem serve para fezes líquidas/preservadas."},
  {cat:"Diagnóstico", front:"Qual método é usado para larvas de Strongyloides stercoralis?", back:"Baermann-Moraes (ou Rugai, Mattos e Brisola): baseia-se no termo-hidrotropismo — as larvas vivas migram para o fundo de um recipiente com água aquecida a 40-42°C."},
  {cat:"Diagnóstico", front:"Qual a técnica de concentração mais usada no Brasil e seu princípio?", back:"Hoffman, Pons e Janer (Lutz) — sedimentação espontânea por gravidade. Fácil, barato, detecta ovos e larvas de helmintos e cistos de protozoários."},
  {cat:"Diagnóstico", front:"Qual método de flutuação usa sulfato de zinco e para que serve?", back:"O método de Faust (centrifugação-flutuação, densidade 1,18): concentra ovos leves de helmintos (principalmente ancilostomídeos) e cistos de protozoários."},
  {cat:"Terapêutica", front:"Qual o mecanismo de ação dos benzimidazóis (mebendazol e albendazol)?", back:"Ligam-se à β-tubulina do parasita, inibindo a polimerização dos microtúbulos e a captação de glicose (afetam funções dependentes de microtúbulos)."},
  {cat:"Terapêutica", front:"Por que o albendazol é o fármaco de escolha para cisticercose e hidatidose?", back:"É bem absorvido, transformado no fígado em sulfóxido ativo, com boa distribuição tecidual — atinge o cisticerco/cisto hidático. Recomenda-se corticoide associado para reduzir a inflamação pela morte do parasita."},
  {cat:"Terapêutica", front:"Qual o mecanismo e a principal indicação do praziquantel?", back:"Aumenta o influxo de Ca²⁺ (canais de cálcio), causando contração e paralisia, e danifica o tegumento (expõe antígenos). É o fármaco de escolha para esquistossomose; também eficaz em teníase e cisticercose."},
  {cat:"Terapêutica", front:"Como se trata a obstrução intestinal por Ascaris?", back:"Com hexaidrato de piperazina (50 mg/kg, máx. 3 g) + óleo mineral, que promovem paralisia flácida do verme (não usar imidazólicos, que podem estimular migração); cirurgia se necessário."},
  {cat:"Terapêutica", front:"Qual o mecanismo da ivermectina e sua principal indicação entre os helmintos intestinais?", back:"Abre canais de cloro regulados por glutamato (só em invertebrados), causando hiperpolarização e paralisia; é o fármaco de escolha contra Strongyloides. Não age em cestódeos/trematódeos."},
  {cat:"Terapêutica", front:"Qual a peculiaridade do tratamento da enterobiose?", back:"Mebendazol, albendazol ou pamoato de pirantel em dose única, repetida em 2 semanas; deve-se tratar todos os comunicantes do domicílio e reforçar a higiene pessoal."},
  {cat:"Prevenção", front:"O que é a estratégia WASH?", back:"Água tratada (water), saneamento ambiental (sanitation) e higiene pessoal (hygiene), combinada ao tratamento de indivíduos expostos/infectados — base da prevenção das geo-helmintíases."},
  {cat:"Prevenção", front:"Que medidas simples de higiene previnem as parasitoses de ciclo fecal-oral?", back:"Lavar as mãos após evacuar e antes das refeições, usar sabonete, aparar unhas, evitar coçar o ânus e levar as mãos à boca, higienizar alimentos e trocar roupas de cama/íntimas frequentemente."},
  {cat:"Prevenção", front:"Por que o uso de calçados é importante na prevenção?", back:"Reduz o risco de ancilostomíase, cujas larvas (L3) penetram ativamente pela pele do hospedeiro."},
  {cat:"Prevenção", front:"O que a OMS recomenda para a quimioprofilaxia coletiva em áreas de alta transmissão?", back:"Tratamento em massa (albendazol 400 mg ou mebendazol 500 mg) a cada 4-6 meses (semestral) em alta transmissão; anual na intermediária; e só com confirmação laboratorial na baixa (&lt;20% entre escolares)."},
  {cat:"Prevenção", front:"Qual foi o impacto do Programa Bahia Azul?", back:"Ao ampliar a cobertura de esgoto em Salvador de 26% para 80%, reduziu a prevalência de Ascaris, Trichuris e Giardia em crianças em 50-70%, mesmo sem nova política de tratamento."},
];

const categories = [...new Set(cards.map(c => c.cat))];
let activeCat = "Todos";
const flipped = new Set();

function render() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  cards.forEach((c, i) => {
    const show = activeCat === "Todos" || c.cat === activeCat;
    const outer = document.createElement('div');
    outer.className = 'card-outer' + (show ? '' : ' hidden') + (flipped.has(i) ? ' flipped' : '');
    outer.innerHTML = `
      <div class="card-inner" data-idx="${i}">
        <div class="card-face card-front">
          <div class="card-cat">${c.cat}</div>
          <div class="card-text">${c.front}</div>
          <div class="card-hint">Clique para ver a resposta</div>
        </div>
        <div class="card-face card-back">
          <div class="card-cat">${c.cat}</div>
          <div class="card-text">${c.back}</div>
          <div class="card-hint">Clique para voltar</div>
        </div>
      </div>`;
    outer.querySelector('.card-inner').addEventListener('click', () => {
      if (flipped.has(i)) flipped.delete(i); else flipped.add(i);
      outer.classList.toggle('flipped');
      updateProgress();
    });
    deck.appendChild(outer);
  });
  updateProgress();
}
function updateProgress() {
  const visibleIdx = cards.map((c,i)=>i).filter(i => activeCat === "Todos" || cards[i].cat === activeCat);
  const total = visibleIdx.length;
  const seen = visibleIdx.filter(i => flipped.has(i)).length;
  document.getElementById('progressText').textContent = `${seen} / ${total} revisados`;
  document.getElementById('progressFill').style.width = total ? `${(seen/total)*100}%` : '0%';
}
function renderFilters() {
  const wrap = document.getElementById('filterControls');
  const all = ["Todos", ...categories];
  wrap.innerHTML = '';
  all.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeCat ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => { activeCat = cat; renderFilters(); render(); });
    wrap.appendChild(btn);
  });
}
renderFilters();
render();
</script>
</body>
</html>
